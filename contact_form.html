<!DOCTYPE html>
<html>

<head>
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="section-one">
            <h1 class="section-one__name">BAVANI MAHENDRAN</h1>
            <p class="section-one__role">Web Developer</p>

            <a href="index.html" class="section-one__contact">Home</a>
        </div>

        <div class="section-contact">

            <form>

                <table>

                    <tr>
                        <td>Name:</td>
                        <td>
                            <input type="text" placeholder="Enter your Name" class="contact__input">
                        </td>
                    </tr>

                    <tr>
                        <td>Email:</td>
                        <td>
                            <input type="email" placeholder="Enter your Email" class="contact__input">
                        </td>
                    </tr>

                    <tr>
                        <td>Message:</td>
                        <td>
                            <textarea placeholder="Message" class="contact__textarea"></textarea>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td>
                            <input type="submit" value="Submit" class="section-one__contact">
                        </td>
                    </tr>

                </table>

            </form>

        </div>

        <div class="section-five">
            <p class="section-five__title">
                Social Media:
                <a href="https://github.com/bavani-2024-aia" target="_blank">GitHub</a>,
                <a href="https://www.linkedin.com/in/bavani-mahendran-4a7a2b314" target="_blank">LinkedIn</a>
            </p>

            <p class="section-five__descr">
                &copy; 2026 BAVANI MAHENDRAN
            </p>
        </div>

    </div>

</body>

</html>
